<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizzerd — আমার বুকমার্কস</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="explore.css"> <!-- আগের এক্সপ্লোর CSS টাই ব্যবহার করব -->
    <style>
        .bm-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-left: 4px solid var(--cyan);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .bm-question {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--text);
        }

        .bm-option {
            background: var(--surface-hover);
            padding: 0.8rem;
            margin-bottom: 0.5rem;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .bm-correct {
            background: rgba(0, 255, 136, 0.1);
            border-color: var(--green);
            color: var(--green);
            font-weight: bold;
        }

        .btn-remove {
            background: rgba(255, 77, 109, 0.1);
            color: var(--red);
            border: 1px solid var(--red);
            padding: 0.4rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            float: right;
        }

        .btn-remove:hover {
            background: var(--red);
            color: #fff;
        }
    </style>
</head>

<body>
    <!-- ===== TOP NAVBAR (Unified for All Pages) ===== -->
    <nav class="navbar">
        <a href="dashboard.html" class="nav-logo">QUIZZERD</a>

        <div class="nav-links">
            <a href="dashboard.html" class="nav-link">
                <span class="nav-icon">⊞</span><span>ড্যাশবোর্ড</span>
            </a>
            <a href="explore.html" class="nav-link">
                <span class="nav-icon">✦</span><span>এক্সপ্লোর</span>
            </a>
            <a href="leaderboard.html" class="nav-link">
                <span class="nav-icon">◈</span><span>লিডারবোর্ড</span>
            </a>
            <a href="bookmarks.html" class="nav-link">
                <span class="nav-icon">🔖</span><span>বুকমার্কস</span>
            </a>
        </div>

        <div class="nav-right">
            <!-- User Menu Container (Dropdown) -->
            <div class="user-menu-container">
                <div class="nav-user-badge" id="userMenuBtn">
                    <div class="user-avatar" id="userAvatar">M</div>
                    <span class="nav-user-name" id="navUserName">ব্যবহারকারী</span>
                    <span class="dropdown-icon">▼</span>
                </div>

                <!-- Dropdown Popup -->
                <div class="user-dropdown hidden" id="userDropdown">
                    <div class="dropdown-header">
                        <div class="dropdown-name" id="dropUserName">ব্যবহারকারীর নাম</div>
                        <div class="dropdown-email" id="dropUserEmail">user@example.com</div>
                    </div>
                    <hr class="dropdown-divider">
                    <button class="dropdown-item logout-item" id="dropdownLogoutBtn">
                        <span class="icon">🚪</span> লগআউট
                    </button>
                </div>
            </div>
        </div>

        <!-- Hamburger Menu -->
        <button class="nav-hamburger" id="navHamburger">
            <span></span><span></span><span></span>
        </button>
    </nav>

    <!-- ===== MOBILE NAV MENU (Unified for All Pages) ===== -->
    <div class="mobile-nav" id="mobileNav">
        <a href="dashboard.html" class="mobile-nav-link">⊞ ড্যাশবোর্ড</a>
        <a href="explore.html" class="mobile-nav-link">✦ এক্সপ্লোর</a>
        <a href="leaderboard.html" class="mobile-nav-link">◈ লিডারবোর্ড</a>
        <a href="bookmarks.html" class="mobile-nav-link">🔖 বুকমার্কস</a>
        <button class="mobile-logout" id="mobileLogoutBtn">লগআউট</button>
    </div>

    <main class="explore-main">
        <h1 class="explore-title" style="text-align: left; margin-bottom: 2rem;">🔖 আমার বুকমার্কস</h1>

        <div id="bookmarksList">
            <p style="color:var(--text-dim);">লোড হচ্ছে...</p>
        </div>
    </main>

    <script src="js/utils.js"></script>
    <script src="js/bookmarks.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizzerd — রিভিউ</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="review.css">
</head>

<body>
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>

    <!-- ===== TOP NAVBAR (Unified) ===== -->
    <nav class="navbar">
        <a href="dashboard.html" class="nav-logo">QUIZZERD</a>

        <div class="nav-links">
            <a href="dashboard.html" class="nav-link">⊞ ড্যাশবোর্ড</a>
            <a href="explore.html" class="nav-link">✦ এক্সপ্লোর</a>
            <a href="leaderboard.html" class="nav-link">◈ লিডারবোর্ড</a>
            <a href="bookmarks.html" class="nav-link">🔖 বুকমার্কস</a>
        </div>

        <div class="nav-right">
            <div class="user-menu-container">
                <div class="nav-user-badge" id="userMenuBtn">
                    <div class="user-avatar" id="userAvatar">M</div>
                    <span class="nav-user-name" id="navUserName">ব্যবহারকারী</span>
                    <span class="dropdown-icon">▼</span>
                </div>

                <div class="user-dropdown hidden" id="userDropdown">
                    <div class="dropdown-header">
                        <div class="dropdown-name" id="dropUserName">নাম</div>
                        <div class="dropdown-email" id="dropUserEmail">ইমেইল</div>
                    </div>
                    <hr class="dropdown-divider">
                    <button class="dropdown-item logout-item" id="dropdownLogoutBtn">
                        <span class="icon">🚪</span> লগআউট
                    </button>
                </div>
            </div>
        </div>

        <button class="nav-hamburger" id="navHamburger">
            <span></span><span></span><span></span>
        </button>
    </nav>

    <!-- Mobile Nav Menu -->
    <div class="mobile-nav" id="mobileNav">
        <a href="dashboard.html" class="mobile-nav-link">⊞ ড্যাশবোর্ড</a>
        <a href="explore.html" class="mobile-nav-link">✦ এক্সপ্লোর</a>
        <a href="leaderboard.html" class="mobile-nav-link">◈ লিডারবোর্ড</a>
        <a href="bookmarks.html" class="mobile-nav-link">🔖 বুকমার্কস</a>
        <button class="mobile-logout" id="mobileLogoutBtn">লগআউট</button>
    </div>

    <main class="review-main">
        <div id="loadingState" class="loading-state">
            <div class="spinner"></div>
            <p>রিভিউ লোড হচ্ছে...</p>
        </div>

        <div id="reviewContent" class="hidden">
            <!-- Header -->
            <div class="review-header">
                <div class="review-meta">
                    <h1 class="review-title" id="reviewSubject">—</h1>
                    <div class="review-badges">
                        <span class="badge" id="reviewDifficulty">—</span>
                        <span class="badge badge-date" id="reviewDate">—</span>
                    </div>

                    <!-- Edit and Delete Buttons -->
                    <div class="action-buttons">
                        <button id="btnEditQuiz" class="btn-edit hidden">✏️ এডিট করুন</button>
                        <button id="btnDeleteQuiz" class="btn-delete hidden">🗑️ ডিলিট করুন</button>
                    </div>
                </div>
                <div class="review-score-box">
                    <div class="score-big" id="reviewScore">০/০</div>
                    <div class="score-pct" id="reviewAccuracy">০%</div>
                    <div class="score-label">সঠিক উত্তর</div>
                </div>
            </div>

            <!-- Summary Bar -->
            <div class="summary-bar">
                <div class="summary-item correct-summary">
                    <span class="summary-icon">✓</span>
                    <span id="summaryCorrect">০</span> সঠিক
                </div>
                <div class="summary-item wrong-summary">
                    <span class="summary-icon">✗</span>
                    <span id="summaryWrong">০</span> ভুল
                </div>
                <div class="summary-item skip-summary">
                    <span class="summary-icon">—</span>
                    <span id="summarySkipped">০</span> বাদ দেওয়া
                </div>
            </div>

            <!-- Questions -->
            <div class="questions-review" id="questionsReview"></div>
        </div>
    </main>

    <!-- Edit Modal Popup -->
    <div id="editModal" class="modal hidden">
        <div class="modal-content">
            <h2 style="margin-bottom: 1rem; color: var(--cyan);">কুইজ এডিট করুন</h2>

            <label style="display:block; margin-bottom: 0.5rem; color: var(--text-dim);">বিষয় (Subject)</label>
            <input type="text" id="editSubjectInput" class="edit-input" placeholder="Subject name">

            <label style="display:block; margin: 1rem 0 0.5rem; color: var(--text-dim);">কাঠিন্য (Difficulty)</label>
            <select id="editDifficultySelect" class="edit-input">
                <option value="easy">সহজ (Easy)</option>
                <option value="medium">মাঝারি (Medium)</option>
                <option value="hard">কঠিন (Hard)</option>
            </select>

            <div style="margin-top: 1.5rem; display: flex; gap: 1rem;">
                <button id="btnSaveUpdate" class="btn-save">সেভ করুন</button>
                <button id="btnCancelUpdate" class="btn-cancel">বাতিল</button>
            </div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/review.js"></script>
</body>

</html>

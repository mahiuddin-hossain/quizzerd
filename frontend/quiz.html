<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizzerd — কুইজ চলছে</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="quiz.css">
</head>
<body>

    <!-- Background Particles -->
    <div class="particles" id="particles"></div>
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>

    <main class="quiz-container">
        
        <!-- ===== 1. LOADING SCREEN ===== -->
        <div id="loadingScreen" class="screen active">
            <div class="loader-content">
                <div class="spinner"></div>
                <h2 class="loading-text">কুইজ লোড হচ্ছে...</h2>
                <p class="loading-sub" id="loadingSub">প্রস্তুত হও!</p>
            </div>
        </div>

        <!-- ===== 2. GAME SCREEN ===== -->
        <div id="gameScreen" class="screen hidden">
            <!-- Header: Progress & Timer -->
            <header class="quiz-header">
                <div class="header-top">
                    <span class="badge-subject" id="subjectBadge">বিষয়</span>
                    <button class="btn-exit" id="exitBtn" title="বের হয়ে যান">✕</button>
                </div>
                
                <div class="progress-container">
                    <div class="progress-info">
                        <span class="q-count">প্রশ্ন <span id="currentQ">১</span>/<span id="totalQ">১০</span></span>
                        <div class="timer-badge">
                            <span class="timer-icon">⏳</span>
                            <span id="timerDisplay">৩০</span>s
                        </div>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" id="progressBar"></div>
                    </div>
                </div>
            </header>

            <!-- Question Area -->
            <section class="question-area">
                <h2 class="question-text" id="questionText">প্রশ্ন লোড হচ্ছে...</h2>
            </section>

            <!-- Options Area -->
            <section class="options-grid" id="optionsGrid">
                <!-- Options JS দিয়ে ইনজেক্ট করা হবে -->
            </section>

            <!-- Footer: Next Button -->
            <footer class="quiz-footer">
                <p class="feedback-msg" id="feedbackMsg"></p>
                <button class="btn-next hidden" id="nextBtn">পরবর্তী প্রশ্ন →</button>
            </footer>
        </div>

        <!-- ===== 3. RESULT SCREEN ===== -->
        <div id="resultScreen" class="screen hidden">
            <div class="result-card">
                <div class="confetti-container" id="confetti"></div>
                
                <div class="score-circle">
                    <svg viewBox="0 0 36 36" class="circular-chart">
                        <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        <path class="circle" id="scoreCirclePath" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        <text x="18" y="20.35" class="percentage" id="scorePercentage">0%</text>
                    </svg>
                </div>

                <h1 class="result-title" id="resultTitle">অভিনন্দন!</h1>
                <p class="result-subtitle">তোমার কুইজ সম্পন্ন হয়েছে</p>

                <div class="stats-row">
                    <div class="stat-box">
                        <span class="stat-val" id="finalScore">0</span>
                        <span class="stat-lbl">পয়েন্ট</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-val" id="finalCorrect">0</span>
                        <span class="stat-lbl">সঠিক</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-val" id="finalWrong">0</span>
                        <span class="stat-lbl">ভুল</span>
                    </div>
                </div>

                <div class="action-buttons">
                    <button class="btn-primary" onclick="window.location.href='dashboard.html'">ড্যাশবোর্ডে যাও</button>
                    <button class="btn-secondary" onclick="window.location.reload()">আবার খেলো</button>
                </div>
            </div>
        </div>

    </main>

    <!-- Scripts -->
    <script src="js/utils.js"></script> <!-- Auth & API helper -->
    <script src="js/quiz.js"></script>   <!-- Main Game Logic -->
</body>
</html>

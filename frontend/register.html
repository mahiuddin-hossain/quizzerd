<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizzerd — Register</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="register.css">
</head>
<body>

    <div class="auth-container">

        <!-- Decorative glowing orbs -->
        <div class="glow-orb glow-orb-1"></div>
        <div class="glow-orb glow-orb-2"></div>

        <!-- Register Card -->
        <div class="auth-card">

            <!-- Logo -->
            <div class="auth-header">
                <h1 class="logo">QUIZZERD</h1>
                <p class="tagline">Create Your Account</p>
            </div>

            <!-- Message Area -->
            <div id="message" class="message hidden"></div>

            <!-- Register Form -->
            <form id="registerForm" class="auth-form" novalidate>

                <!-- First Name + Last Name (side by side) -->
                <div class="name-row">
                    <div class="input-group">
                        <label for="firstName">First Name</label>
                        <input
                            type="text"
                            id="firstName"
                            name="firstName"
                            placeholder="First name"
                            autocomplete="given-name"
                            required
                        >
                    </div>
                    <div class="input-group">
                        <label for="lastName">Last Name</label>
                        <input
                            type="text"
                            id="lastName"
                            name="lastName"
                            placeholder="Last name"
                            autocomplete="family-name"
                            required
                        >
                    </div>
                </div>

                <!-- Username -->
                <div class="input-group">
                    <label for="username">Username</label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        placeholder="Choose a username"
                        autocomplete="username"
                        required
                    >
                </div>

                <!-- Email -->
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="Enter your email"
                        autocomplete="email"
                        required
                    >
                </div>

                <!-- Password -->
                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="Create a password (min 6 chars)"
                            autocomplete="new-password"
                            required
                        >
                        <button type="button" class="toggle-password" id="togglePassword" aria-label="Toggle password visibility">
                            👁
                        </button>
                    </div>
                </div>

                <!-- Confirm Password -->
                <div class="input-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <div class="password-wrapper">
                        <input
                            type="password"
                            id="confirmPassword"
                            name="confirmPassword"
                            placeholder="Confirm your password"
                            autocomplete="new-password"
                            required
                        >
                        <button type="button" class="toggle-password" id="toggleConfirmPassword" aria-label="Toggle password visibility">
                            👁
                        </button>
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn-primary" id="registerBtn">
                    <span class="btn-text">CREATE ACCOUNT</span>
                    <span class="btn-loader hidden"></span>
                </button>

            </form>

            <!-- Login Link -->
            <div class="auth-footer">
                <p>Already have an account? <a href="login.html">Login here</a></p>
            </div>

        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>

</body>
</html>

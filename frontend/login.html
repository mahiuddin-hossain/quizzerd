<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizzerd — Login</title>

    <!-- Google Fonts: Orbitron (display) + Syne (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Page-specific stylesheet -->
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <!-- Main Auth Container -->
    <div class="auth-container">

        <!-- Background decorative glowing orbs -->
        <div class="glow-orb glow-orb-1"></div>
        <div class="glow-orb glow-orb-2"></div>

        <!-- Login Card -->
        <div class="auth-card">

            <!-- Logo & Tagline -->
            <div class="auth-header">
                <h1 class="logo">QUIZZERD</h1>
                <p class="tagline">Challenge Your Mind with AI</p>
            </div>

            <!-- Message Area (for errors and success) -->
            <div id="message" class="message hidden"></div>

            <!-- Login Form -->
            <form id="loginForm" class="auth-form" novalidate>

                <!-- Username Field -->
                <div class="input-group">
                    <label for="username">Username</label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        placeholder="Enter your username"
                        autocomplete="username"
                        required
                    >
                </div>

                <!-- Password Field -->
                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="Enter your password"
                            autocomplete="current-password"
                            required
                        >
                        <button type="button" class="toggle-password" id="togglePassword" aria-label="Toggle password visibility">
                            👁
                        </button>
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn-primary" id="loginBtn">
                    <span class="btn-text">LOGIN</span>
                    <span class="btn-loader hidden"></span>
                </button>

            </form>

            <!-- Register Link -->
            <div class="auth-footer">
                <p>Don't have an account? <a href="register.html">Register here</a></p>
            </div>

        </div>
    </div>

    <!-- Scripts: utils first (shared), then auth logic -->
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>

</body>
</html>
